<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="UTF-8">
      <title>Szeccsa</title>
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta http-equiv="Cache-Control" content="no-cache">
		<meta name="robots" content="noindex, nofollow, noimageindex, nosnippet, noarchive">
		<meta name="description" content="Szeccsa">
		<meta name="keywords" content="Szeccsa, szeccsa">
		<meta name="author" content="Szeccsa">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
      <meta name="theme-color" content="#000"/>

      <meta property="og:title" content="Szeccsa">
		<meta property="og:description" content="The OFFICIAL website of Szeccsa. You can find all of your links and embeds in one place.">
      <!-- Az SVG tamogatas sketchy a nepszeru kozossegi portalokon hogy basszam meg a szajukat, ezert nincs preview kep.-->
		<!--meta property="og:image" content="/assets/i/youhuu-point2.svg"-->
		<meta property="og:url" content="https://szeccsa.github.io">
		<meta property="og:type" content="website">

      <link rel="stylesheet" href="/assets/css/style.css"/>
   </head>
   <body>
      <div class="bg"></div>
      <div class="container">
         <p class="centered" id="countdown"></p>
         <script>
            var countDownDate = new Date("May 11, 2026 00:00:00").getTime();

            var x = setInterval(function() {

            var now = new Date().getTime();

            var distance = countDownDate - now;

            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);
               
            document.getElementById("countdown").innerHTML = days + "d " + hours + "h "
            + minutes + "m " + seconds + "s ";
            if (distance < 0) {
               clearInterval(x);
               document.getElementById("countdown").innerHTML = "EXPIRED";
            }
            }, 1000);
         </script>
      </div>
   </body>
</html>
