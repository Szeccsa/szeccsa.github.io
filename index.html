<!DOCTYPE html>
<html lang="en" dir="auto">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>Szeccsa</title>
		<meta name="description" content="Szeccsa">
		<meta name="keywords" content="Szeccsa, szeccsa">
		<meta name="author" content="Szeccsa">
		<meta name="robots" content="index, nofollow, noimageindex, nosnippet, noarchive">
		<meta name="googlebot" content="index, nofollow, noimageindex, nosnippet, noarchive">
		<meta name="twitter:card" content="summary">
		<meta name="twitter:title" content="Szeccsa">
		<meta name="twitter:description" content="Szeccsa">
		<meta name="twitter:image" content="/assets/i/logo.svg">
		<meta name="twitter:creator" content="@Szeccsa">

		<meta property="og:title" content="Szeccsa">
		<meta property="og:description" content="Szeccsa">
		<meta property="og:image" content="/assets/i/logo.svg">
		<meta property="og:url" content="https://szeccsa.github.io">
		<meta property="og:type" content="website">

		<link rel="manifest" href="/manifest.json">
		<link rel="canonical" href="https://szeccsa.github.io">
		<link rel="icon" type="image/x-icon" href="/assets/i/logo.svg">
		<link rel="apple-touch-icon" href="/assets/i/logo.svg">
		
		<style>
			.page-loading {
			position: fixed;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			width: 100%;
			height: 100%;
			-webkit-transition: all .4s .2s ease-in-out;
			transition: all .4s .2s ease-in-out;
			background-color: #fff;
			opacity: 0;
			visibility: hidden;
			z-index: 9999;
			}

			[data-bs-theme="dark"] .page-loading {
				background-color: #121519;
			}

			.page-loading.active {
				opacity: 1;
				visibility: visible;
			}

			.page-loading-inner {
				position: absolute;
				top: 50%;
				left: 0;
				width: 100%;
				text-align: center;
				-webkit-transform: translateY(-50%);
				transform: translateY(-50%);
				-webkit-transition: opacity .2s ease-in-out;
				transition: opacity .2s ease-in-out;
				opacity: 0;
			}

			.page-loading.active>.page-loading-inner {
				opacity: 1;
			}

			.page-loading-inner>span {
				display: block;
				font-family: "Inter", sans-serif;
				font-size: 1rem;
				font-weight: normal;
				color: #6f788b;
			}

			[data-bs-theme="dark"] .page-loading-inner>span {
				color: #fff;
				opacity: .6;
			}

			.page-spinner {
				display: inline-block;
				width: 2.75rem;
				height: 2.75rem;
				margin-bottom: .75rem;
				vertical-align: text-bottom;
				background-color: #d7dde2;
				border-radius: 50%;
				opacity: 0;
				-webkit-animation: spinner .75s linear infinite;
				animation: spinner .75s linear infinite;
			}
		</style>

		<script>
		(function () {
			window.onload = function () {
			const preloader = document.querySelector('.page-loading')
			preloader.classList.remove('active')
			setTimeout(function () {
				preloader.remove()
			}, 1500)
			}
		})()
		</script>
	</head>
	<body>
		<div class="page-loading active">
			<div class="page-loading-inner">
				<img src="assets/i/squareloading.gif" alt="Loading" title="Please wait..." draggable="false" width="50" height="50" style="margin-bottom: 10px;">
				<span>Loading ...</span>
			</div>
		</div>
		<h1>Coming soon.</h1>
	</body>
</html>
